<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Restablecer contraseña — Matanga</title>
  <script>
    // Tomar los parámetros de la URL
    const params = window.location.search;
    const hash = window.location.hash;
    
    // Redirigir a la app con los mismos parámetros
    window.location.href = 'matanga://nueva-password' + params + hash;
    
    // Fallback — si no abre la app en 2 segundos, mostrar mensaje
    setTimeout(() => {
      document.getElementById('msg').style.display = 'block';
    }, 2000);
  </script>
</head>
<body style="background:#0a0a0f;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:16px;">
  <img src="MatangaTexto.png" style="height:40px;">
  <p>Abriendo Matanga...</p>
  <p id="msg" style="display:none;color:#aaa;font-size:14px;text-align:center;">
    Si la app no abre automáticamente,<br>asegúrate de tener Matanga instalado.
  </p>
</body>
</html>
